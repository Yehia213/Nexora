<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Search</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff7eb3, #59d0ff);
            height: 100%;
            color: white;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            transition: opacity 1s ease;
        }

        .hidden {
            opacity: 0;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-box input {
            border: none;
            outline: none;
            background: transparent;
            color: #fff;
            font-size: 1.2rem;
            width: 300px;
            margin-right: 10px;
        }

        .search-box button {
            background: #fff;
            color: #ff7eb3;
            font-size: 1.2rem;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        .results-box {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            max-width: 80%;
            margin: 20px auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .result {
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="container" id="homePage">
        <header>
            <h1>Nexora</h1>
        </header>
        <main>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search Nexora">
                <button onclick="performSearch()">🔍</button>
            </div>
        </main>
    </div>

    <div class="container hidden" id="resultsPage">
        <div class="results-box" id="resultsContainer">
        </div>
    </div>

    <script>
        function performSearch() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                document.getElementById('homePage').classList.add('hidden');
                fetchResults(query);
            }
        }

        function fetchResults(query) {
            fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&pretty=1`)
                .then(response => response.json())
                .then(data => {
                    displayResults(data.RelatedTopics);
                    document.getElementById('resultsPage').classList.remove('hidden');
                })
                .catch(error => console.error('Error fetching results:', error));
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            results.forEach(result => {
                if (result.Text && result.FirstURL) {
                    container.innerHTML += `
                        <div class="result">
                            <a href="${result.FirstURL}" target="_blank">${result.Text}</a>
                        </div>`;
                }
            });
        }
    </script>
</body>

</html>
