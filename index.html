<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff7eb3, #59d0ff);
            color: #fff;
            height: 100%;
        }

        /* Container */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        /* Header */
        header {
            margin-bottom: 20px;
        }

        header img {
            width: 120px; /* Adjust size as needed */
            height: auto;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }

        /* Search Box */
        .search-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 10px 20px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box input {
            border: none;
            outline: none;
            background: transparent;
            color: #fff;
            font-size: 1.2rem;
            width: 300px;
            margin-right: 10px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box button {
            background: #fff;
            color: #ff7eb3;
            font-size: 1.2rem;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.1);
        }

        /* Footer */
        footer p {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <!-- Add the Nexora logo here -->
            <h1>Nexora</h1>
        </header>
        <main>
            <div class="search-box">
                <input type="text" placeholder="Search Nexora" id="search-input">
                <button id="search-btn">🔍</button>
            </div>
        </main>
        <footer>
            <p>&copy; 2024 Nexora. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // JavaScript to handle the search functionality
        document.getElementById('search-btn').addEventListener('click', function () {
            const query = document.getElementById('search-input').value;
            if (query) {
                // Replace with your search engine's URL or API
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        });

        document.getElementById('search-input').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });
    </script>
</body>
</html>
